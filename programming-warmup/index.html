<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Background</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(90deg, #08060d 0%, #1c1030 40%, #0f0821 100%);
        color: #f8fafc;
      }
      .top-bar {
        width: 100%;
        height: 92px;
        background: #000000;
        position: relative;
        overflow: hidden;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      }
      .top-bar::before {
        content: '';
        position: absolute;
        inset: 0;
        background: none;
      }
      .top-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: none;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="top-bar"></div>
  </body>
</html>
